<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 项目共创平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#10b981',
                        accent: '#f59e0b',
                        dark: '#1f2937',
                        light: '#f3f4f6',
                    },
                },
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">
    <header class="bg-white shadow-sm">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <a href="/" class="text-2xl font-bold text-primary">项目共创平台</a>
                <nav class="hidden md:flex space-x-6">
                    <a href="/" class="hover:text-primary transition-colors">首页</a>
                    <a href="/projects" class="hover:text-primary transition-colors">项目广场</a>
                    <a href="/tags" class="hover:text-primary transition-colors">标签</a>
                </nav>
            </div>
            <div class="flex items-center space-x-4">
                <a href="/login" class="hover:text-primary transition-colors">登录</a>
                <a href="/register" class="bg-primary text-white px-4 py-2 rounded-md hover:bg-primary/90 transition-colors">注册</a>
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8">
        <div class="max-w-md mx-auto bg-white rounded-lg shadow-sm p-6 mt-12">
            <h1 class="text-2xl font-bold mb-6 text-center">登录</h1>
            
            {% if error != "" %}
                <div class="bg-red-100 text-red-700 p-3 rounded-md mb-4">
                    {{ error }}
                </div>
            {% endif %}
            
            <form method="post" action="/login">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <div class="mb-4">
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">邮箱</label>
                    <input type="email" id="email" name="email" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary" required>
                </div>
                
                <div class="mb-6">
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                    <input type="password" id="password" name="password" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary" required>
                </div>
                
                <button type="submit" class="w-full bg-primary text-white font-semibold py-2 px-4 rounded-md hover:bg-primary/90 transition-colors">
                    登录
                </button>
            </form>
            
            <div class="mt-4 text-center">
                <p class="text-gray-600">还没有账号？ <a href="/register" class="text-primary hover:underline">立即注册</a></p>
            </div>
        </div>
    </main>

    <footer class="bg-gray-800 text-white py-8">
        <div class="container mx-auto px-4">
            <div class="flex flex-col md:flex-row justify-between">
                <div class="mb-4 md:mb-0">
                    <h3 class="text-xl font-bold mb-2">项目共创平台</h3>
                    <p class="text-gray-400">让创意变为现实</p>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-8">
                    <div>
                        <h4 class="font-semibold mb-2">平台</h4>
                        <ul class="space-y-1">
                            <li><a href="/" class="text-gray-400 hover:text-white transition-colors">首页</a></li>
                            <li><a href="/projects" class="text-gray-400 hover:text-white transition-colors">项目广场</a></li>
                            <li><a href="/tags" class="text-gray-400 hover:text-white transition-colors">标签</a></li>
                        </ul>
                    </div>
                    <div>
                        <h4 class="font-semibold mb-2">资源</h4>
                        <ul class="space-y-1">
                            <li><a href="#" class="text-gray-400 hover:text-white transition-colors">帮助中心</a></li>
                            <li><a href="#" class="text-gray-400 hover:text-white transition-colors">社区指南</a></li>
                            <li><a href="#" class="text-gray-400 hover:text-white transition-colors">常见问题</a></li>
                        </ul>
                    </div>
                    <div>
                        <h4 class="font-semibold mb-2">关于</h4>
                        <ul class="space-y-1">
                            <li><a href="#" class="text-gray-400 hover:text-white transition-colors">关于我们</a></li>
                            <li><a href="#" class="text-gray-400 hover:text-white transition-colors">联系方式</a></li>
                            <li><a href="#" class="text-gray-400 hover:text-white transition-colors">隐私政策</a></li>
                        </ul>
                    </div>
                </div>
            </div>
            <div class="border-t border-gray-700 mt-8 pt-8 text-center text-gray-400">
                <p>&copy; 2026 项目共创平台. 保留所有权利.</p>
            </div>
        </div>
    </footer>
</body>
</html>
