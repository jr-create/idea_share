{% extends "base.html" %}

{% block title %}提交创意 - 项目共创平台{% endblock %}

{% block content %}
<div class="bg-white rounded-lg shadow-sm p-6 fade-in">
    <h1 class="text-2xl font-bold mb-6">提交创意</h1>
    
    <form method="post" action="/projects/{{ project_id }}/ideas">
        <div class="mb-4">
            <label for="title" class="block text-sm font-medium text-gray-700 mb-1">创意标题</label>
            <input type="text" id="title" name="title" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary" required>
        </div>
        
        <div class="mb-4">
            <label for="content" class="block text-sm font-medium text-gray-700 mb-1">创意描述</label>
            <textarea id="content" name="content" rows="4" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary" required></textarea>
        </div>
        
        <div class="mb-4">
            <label for="idea_type" class="block text-sm font-medium text-gray-700 mb-1">创意类型</label>
            <select id="idea_type" name="idea_type" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                <option value="feature">功能建议</option>
                <option value="design">设计方案</option>
                <option value="technical">技术实现</option>
                <option value="other">其他</option>
            </select>
        </div>
        
        <div class="mb-4">
            <label for="feasibility_score" class="block text-sm font-medium text-gray-700 mb-1">可行性评分</label>
            <input type="number" id="feasibility_score" name="feasibility_score" min="1" max="5" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
        </div>
        
        <div class="mb-4">
            <label for="estimated_cost" class="block text-sm font-medium text-gray-700 mb-1">预估成本</label>
            <input type="text" id="estimated_cost" name="estimated_cost" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
        </div>
        
        <div class="flex justify-end space-x-4">
            <a href="/projects/{{ project_id }}" class="px-4 py-2 border border-gray-300 rounded-md hover:bg-gray-100">取消</a>
            <button type="submit" class="bg-primary text-white font-semibold py-2 px-4 rounded-md hover:bg-primary/90">保存</button>
        </div>
    </form>
</div>
{% endblock %}
