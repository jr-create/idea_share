{% extends "base.html" %}

{% block title %}添加任务 - 项目共创平台{% endblock %}

{% block content %}
<div class="bg-white rounded-lg shadow-sm p-6 fade-in">
    <h1 class="text-2xl font-bold mb-6">添加任务</h1>
    
    <form method="post" action="/projects/{{ project_id }}/tasks">
        <div class="mb-4">
            <label for="title" class="block text-sm font-medium text-gray-700 mb-1">任务标题</label>
            <input type="text" id="title" name="title" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary" required>
        </div>
        
        <div class="mb-4">
            <label for="description" class="block text-sm font-medium text-gray-700 mb-1">任务描述</label>
            <textarea id="description" name="description" rows="4" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary"></textarea>
        </div>
        
        <div class="mb-4">
            <label for="assignee_id" class="block text-sm font-medium text-gray-700 mb-1">负责人</label>
            <input type="number" id="assignee_id" name="assignee_id" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
        </div>
        
        <div class="mb-4">
            <label for="due_date" class="block text-sm font-medium text-gray-700 mb-1">截止日期</label>
            <input type="date" id="due_date" name="due_date" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
        </div>
        
        <div class="flex justify-end space-x-4">
            <a href="/projects/{{ project_id }}" class="px-4 py-2 border border-gray-300 rounded-md hover:bg-gray-100">取消</a>
            <button type="submit" class="bg-primary text-white font-semibold py-2 px-4 rounded-md hover:bg-primary/90">保存</button>
        </div>
    </form>
</div>
{% endblock %}
