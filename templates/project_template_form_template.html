{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="container mt-5">
    <h1>{{ title }}</h1>
    
    {% if error %}
    <div class="alert alert-danger" role="alert">
        {{ error }}
    </div>
    {% endif %}
    
    <form method="post" enctype="multipart/form-data">
        <div class="mb-3">
            <label for="name" class="form-label">模板名称</label>
            <input type="text" class="form-control" id="name" name="name" value="{{ template_data.name }}" required>
        </div>
        
        <div class="mb-3">
            <label for="title" class="form-label">项目标题</label>
            <input type="text" class="form-control" id="title" name="title" value="{{ template_data.title }}" required>
        </div>
        
        <div class="mb-3">
            <label for="summary" class="form-label">项目摘要</label>
            <textarea class="form-control" id="summary" name="summary" rows="3">{{ template_data.summary }}</textarea>
        </div>
        
        <div class="mb-3">
            <label for="description" class="form-label">项目描述</label>
            <textarea class="form-control" id="description" name="description" rows="5">{{ template_data.description }}</textarea>
        </div>
        
        <div class="mb-3">
            <label for="category" class="form-label">分类</label>
            <input type="text" class="form-control" id="category" name="category" value="{{ template_data.category }}">
        </div>
        
        <div class="mb-3">
            <label for="stage" class="form-label">阶段</label>
            <select class="form-control" id="stage" name="stage">
                <option value="idea" {% if template_data.stage == "idea" %}selected{% endif %}>创意</option>
                <option value="planning" {% if template_data.stage == "planning" %}selected{% endif %}>规划</option>
                <option value="execution" {% if template_data.stage == "execution" %}selected{% endif %}>执行</option>
                <option value="completed" {% if template_data.stage == "completed" %}selected{% endif %}>完成</option>
            </select>
        </div>
        
        <div class="mb-3">
            <label for="location" class="form-label">位置</label>
            <input type="text" class="form-control" id="location" name="location" value="{{ template_data.location }}">
        </div>
        
        <div class="mb-3">
            <label for="budget_range" class="form-label">预算范围</label>
            <input type="text" class="form-control" id="budget_range" name="budget_range" value="{{ template_data.budget_range }}">
        </div>
        
        <div class="mb-3">
            <label for="existing_resources" class="form-label">现有资源</label>
            <textarea class="form-control" id="existing_resources" name="existing_resources" rows="3">{{ template_data.existing_resources }}</textarea>
        </div>
        
        <div class="mb-3">
            <label for="needed_resources" class="form-label">所需资源</label>
            <textarea class="form-control" id="needed_resources" name="needed_resources" rows="3">{{ template_data.needed_resources }}</textarea>
        </div>
        
        <div class="mb-3">
            <label for="tags" class="form-label">标签 (用逗号分隔)</label>
            <input type="text" class="form-control" id="tags" name="tags" value="{{ template_data.tags }}">
        </div>
        
        <div class="d-flex justify-content-between">
            <button type="submit" class="btn btn-primary">保存</button>
            <a href="{{ cancel_url }}" class="btn btn-secondary">取消</a>
        </div>
    </form>
</div>
{% endblock %}
