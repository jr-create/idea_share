{% extends "base.html" %}

{% block title %}编辑资料 - 项目共创平台{% endblock %}

{% block content %}
<div class="bg-white rounded-lg shadow-sm p-6 fade-in">
    <h1 class="text-2xl font-bold mb-6">编辑资料</h1>
    
    <form method="post" action="/dashboard/profile/edit" enctype="multipart/form-data">
        <div class="mb-4">
            <label for="bio" class="block text-sm font-medium text-gray-700 mb-1">个人简介</label>
            <textarea id="bio" name="bio" rows="4" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">{{ user_detail.bio }}</textarea>
        </div>
        
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">头像</label>
            <div class="flex flex-col sm:flex-row items-center">
                <div class="mr-6 mb-4 sm:mb-0">
                    <img id="avatar-preview" src="{{ user_detail.avatar_url }}" alt="User avatar" class="w-20 h-20 rounded-full object-cover">
                </div>
                <div class="flex-grow">
                    <div class="mb-2">
                        <input type="file" id="avatar-upload" name="avatar" accept="image/jpeg,image/png,image/webp" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                        <p class="text-xs text-gray-500 mt-1">支持 JPG、PNG、WebP 格式，文件大小不超过 5MB</p>
                    </div>
                    <input type="hidden" id="avatar_url" name="avatar_url" value="{{ user_detail.avatar_url }}">
                </div>
            </div>
        </div>
        
        <div class="flex justify-end space-x-4">
            <a href="/u/{{ user.as_ref().unwrap().username }}" class="px-4 py-2 border border-gray-300 rounded-md hover:bg-gray-100">取消</a>
            <button type="submit" class="bg-primary text-white font-semibold py-2 px-4 rounded-md hover:bg-primary/90">保存</button>
        </div>
    </form>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const avatarUpload = document.getElementById('avatar-upload');
            const avatarPreview = document.getElementById('avatar-preview');
            const avatarUrlInput = document.getElementById('avatar_url');
            
            avatarUpload.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    // 验证文件大小
                    if (file.size > 5 * 1024 * 1024) {
                        alert('文件大小不能超过 5MB');
                        return;
                    }
                    
                    // 验证文件类型
                    const allowedTypes = ['image/jpeg', 'image/png', 'image/webp'];
                    if (!allowedTypes.includes(file.type)) {
                        alert('只支持 JPG、PNG、WebP 格式的图片');
                        return;
                    }
                    
                    // 预览图片
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        avatarPreview.src = e.target.result;
                        // 这里可以添加图片上传的逻辑，将图片上传到服务器
                        // 暂时使用本地预览
                    };
                    reader.readAsDataURL(file);
                }
            });
        });
    </script>
</div>
{% endblock %}
