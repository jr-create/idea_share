{% extends "base.html" %}

{% block title %}添加需求 - 项目共创平台{% endblock %}

{% block content %}
<div class="bg-white rounded-lg shadow-sm p-6 fade-in">
    <h1 class="text-2xl font-bold mb-6">添加需求</h1>
    
    <form method="post" action="/projects/{{ project_id }}/needs">
        <div class="mb-4">
            <label for="title" class="block text-sm font-medium text-gray-700 mb-1">需求标题</label>
            <input type="text" id="title" name="title" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary" required>
        </div>
        
        <div class="mb-4">
            <label for="description" class="block text-sm font-medium text-gray-700 mb-1">需求描述</label>
            <textarea id="description" name="description" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary"></textarea>
        </div>
        
        <div class="mb-4">
            <label for="priority" class="block text-sm font-medium text-gray-700 mb-1">优先级</label>
            <select id="priority" name="priority" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                <option value="high">高</option>
                <option value="medium" selected>中</option>
                <option value="low">低</option>
            </select>
        </div>
        
        <div class="flex justify-end space-x-4">
            <a href="/projects/{{ project_id }}" class="px-4 py-2 border border-gray-300 rounded-md hover:bg-gray-100">取消</a>
            <button type="submit" class="bg-primary text-white font-semibold py-2 px-4 rounded-md hover:bg-primary/90">保存</button>
        </div>
    </form>
</div>
{% endblock %}
