version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/idea_share
      - HOST=0.0.0.0
      - PORT=3000
      - SECRET_KEY=${SECRET_KEY:-default_secret_key}
    depends_on:
      - db
    volumes:
      - ./src:/app/src
      - ./templates:/app/templates
      - ./migrations:/app/migrations

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=idea_share
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: